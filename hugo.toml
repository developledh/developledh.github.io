baseURL = "https://iwasborntodothis.co.kr/"
languageCode = "en-us"
title = "Dong Ho Lee | Researcher"
theme = "PaperMod"
paginate = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Dong Ho Lee"
  description = "M.S-PhD Integrated Student / Researcher at Chungbuk National University"
  keywords = ["Computational material science", "metal-halide", "Multiscale modeling"]
  author = "Dong Ho Lee"
  images = ["/images/profile.jpg"]
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.assets]
    favicon = "/favicon.ico"

  [params.label]
    text = "Home"

  [params.profileMode]
    enabled = true
    title = "Dong Ho Lee"
    subtitle = "M.S-Ph.D Student in Material Science @ Chungbuk national university  \nResearch interests: Machine Learning, NLP, [Your Field]"
    imageUrl = "/images/profile.jpg"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Profile Photo"
    [[params.profileMode.buttons]]
      name = "Publications"
      url = "/publications"
    [[params.profileMode.buttons]]
      name = "Awards"
      url = "/awards"
    [[params.profileMode.buttons]]
      name = "CV"
      url = "/cv.pdf"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/developledh"
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"
  [[params.socialIcons]]
    name = "googlescholar"
    url = "https://scholar.google.com/citations?user=YOURID"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:dongho0724@naver.com"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/yourusername"

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "publications"
    name = "Publications"
    url = "/publications/"
    weight = 20
  [[menu.main]]
    identifier = "awards"
    name = "Awards"
    url = "/awards/"
    weight = 40
  [[menu.main]]
    identifier = "news"
    name = "News"
    url = "/news/"
    weight = 50
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 60
  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/cv.pdf"
    weight = 70

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
